<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>JYSK Task Manager</title>
</head>
<body>
<h1>Meine Aufgabenübersicht</h1>

<ul>
    <li th:each="task : ${tasks}">
        <strong th:text="${task.title}">Titel</strong>:
        <span th:text="${task.description}">Beschreibung</span>
    </li>
</ul>
</body>
</html>
